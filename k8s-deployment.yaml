apiVersion: apps/v1
kind: Deployment
metadata:
  name: maven-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maven-app
  template:
    metadata:
      labels:
        app: maven-app
    spec:
      containers:
      - name: maven-app
        image: johnny0419/simple-maven-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: maven-app-service
spec:
  type: NodePort
  selector:
    app: maven-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30008
